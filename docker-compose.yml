services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./apps/backend:/app
      - ./apps/s3:/s3-config:ro
    depends_on:
      - s3
    environment:
      COGNITO_MODE: mock
      COGNITO_IMPORT_POLL_INTERVAL_MS: 2000
      S3_ENDPOINT: http://s3:3900
      S3_REGION: garage
      S3_BUCKET: cognito-csv
      S3_CREDENTIALS_FILE: /s3-config/credentials.env
      JOB_STEP_DELAY_MS: 1500

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules

  s3:
    image: dxflrs/garage:v1.0.1
    ports:
      - "3900:3900"  # S3 API
      - "3902:3902"  # Web
      - "3903:3903"  # Admin
    volumes:
      - ./apps/s3/garage.toml:/etc/garage.toml
      - garage_data:/var/lib/garage

volumes:
  frontend_node_modules:
  garage_data:
